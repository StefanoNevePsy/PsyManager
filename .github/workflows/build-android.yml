name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release with the APK'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

concurrency:
  group: android-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to compute commit-count versionCode

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install rsvg-convert (for icon PNG generation)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ----------------------------------------------------------------------
      # Compute version metadata.
      # versionCode: commit count — strictly monotonically increasing.
      # versionName: package.json version + build number (informative).
      # ----------------------------------------------------------------------
      - name: Compute version metadata
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_NAME="${PKG_VERSION}.${COMMIT_COUNT}"
          echo "package_version=$PKG_VERSION"   >> "$GITHUB_OUTPUT"
          echo "version_code=$COMMIT_COUNT"     >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME"     >> "$GITHUB_OUTPUT"
          echo "tag=android-v$VERSION_NAME"     >> "$GITHUB_OUTPUT"
          echo ""
          echo "versionCode = $COMMIT_COUNT"
          echo "versionName = $VERSION_NAME"

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CALENDAR_API_KEY: ${{ secrets.VITE_GOOGLE_CALENDAR_API_KEY }}
        # cap:build emits root-relative URLs (base "/") and skips the PWA
        # service worker, both required for the Capacitor WebView. The
        # default `npm run build` is for GitHub Pages and bakes in
        # `/PsyManager/` paths that 404 inside the native app.
        run: npm run cap:build

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Customize Android (icons, back gestures, version)
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: ./scripts/setup-android.sh

      # ----------------------------------------------------------------------
      # Decode release keystore from secrets if available; otherwise
      # the build will produce a debug-signed APK that is still installable
      # for testing/sideloading. For production releases (Play Store or
      # OTA updates that preserve data), configure the keystore secrets:
      #   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
      #   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      # ----------------------------------------------------------------------
      - name: Check keystore availability
        id: keystore_check
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret is not set. Building a debug-signed APK."
            echo "::warning::Updates installed from a debug APK and a release APK are NOT compatible — you will lose data when switching."
          fi

      - name: Decode release keystore
        id: keystore
        if: ${{ steps.keystore_check.outputs.available == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Configure signing in build.gradle
        if: ${{ steps.keystore_check.outputs.available == 'true' }}
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib, re
          p = pathlib.Path("android/app/build.gradle")
          content = p.read_text()

          signing_block = """
              signingConfigs {
                  release {
                      storeFile file(System.getenv("KEYSTORE_PATH"))
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
          """

          if "signingConfigs" not in content:
              content = re.sub(r'(android\s*\{\s*)', r'\1' + signing_block + '\n', content, count=1)

          # Wire the release buildType to use the release signingConfig
          content = re.sub(
              r'(buildTypes\s*\{\s*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              content,
              count=1,
          )
          p.write_text(content)
          PYEOF

      - name: Build APK
        working-directory: android
        env:
          KEYSTORE_PATH:     ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          if [ "${{ steps.keystore_check.outputs.available }}" = "true" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug   --no-daemon --stacktrace
          fi

      - name: Locate built APK
        id: apk
        run: |
          if [ "${{ steps.keystore_check.outputs.available }}" = "true" ]; then
            APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
            SUFFIX=""
          else
            APK_PATH=$(find android/app/build/outputs/apk/debug   -name "*.apk" | head -n 1)
            SUFFIX="-debug"
          fi
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          DEST="psymanager-${{ steps.version.outputs.version_name }}${SUFFIX}.apk"
          cp "$APK_PATH" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "Built: $DEST"
          ls -lh "$DEST"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: psymanager-android-${{ steps.version.outputs.version_name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # ----------------------------------------------------------------------
      # Publish a GitHub Release with the APK attached.
      # Skip on manual runs where release=false.
      # ----------------------------------------------------------------------
      - name: Generate release notes
        if: ${{ github.event_name == 'push' || inputs.release == 'true' }}
        id: notes
        run: |
          {
            echo 'notes<<RELEASEEOF'
            echo "## PsyManager Android · ${{ steps.version.outputs.version_name }}"
            echo ""
            echo "**versionCode:** \`${{ steps.version.outputs.version_code }}\`"
            echo "**versionName:** \`${{ steps.version.outputs.version_name }}\`"
            echo "**Commit:** ${{ github.sha }}"
            echo ""
            echo "### Recent changes"
            git log --pretty=format:'- %s (%h)' -n 10
            echo ""
            echo ""
            echo "### Installation"
            echo "1. Download \`psymanager-${{ steps.version.outputs.version_name }}.apk\` below"
            echo "2. On your Android device, allow installation from unknown sources"
            echo "3. Open the APK to install or update — your local data is preserved across updates"
            echo 'RELEASEEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || inputs.release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PsyManager Android ${{ steps.version.outputs.version_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
